<main class="layout">
  <section class="top">
    @if (fatal()) {
      <app-error-banner [error]="fatal()"></app-error-banner>
    }
    
    <header class="header">
      <h1>Blind Eternities Planechase</h1>
      <div class="subtitle">Milestone 3 — Deck, Reveal, and Modal Sequencing</div>

      @if(hasFatal()) {
        <button class="reload" (click)="onReload()">
          Reload
        </button>
      }
    </header>
  </section>

  <section class="content">
    <div class="left">
      <div class="panel">
        <h2>Event Log</h2>
        <div class="empty">No events yet (Milestone 4 turn loop in progress).</div>
      </div>

      <div class="panel">
        <h2>Debug</h2>
        <app-debug-panel></app-debug-panel>
      </div>
    </div>

    <div class="right">
      <div class="canvasHost" #phaserHost></div>
    </div>
  </section>
</main>

<app-modal-host></app-modal-host>
