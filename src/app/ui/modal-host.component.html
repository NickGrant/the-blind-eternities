@if (activeModal()) {
  <div class="modal modal-host d-block" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable modal-dialog-centered modal-host__dialog">
      <section
      #modalPanel
      class="modal-content modal-host__panel"
      [class.modal-host__panel--dragging]="isDragging()"
      [style.--be-modal-offset-x]="modalOffsetX()"
      [style.--be-modal-offset-y]="modalOffsetY()"
      (pointerdown)="onModalPointerDown($event)"
      role="dialog"
      aria-modal="false"
      [attr.aria-labelledby]="'modal-title-' + activeModal()!.id"
      [attr.aria-describedby]="'modal-body-' + activeModal()!.id"
      tabindex="-1"
    >
      <div class="modal-host__attention" aria-hidden="true"></div>
      <header class="modal-header modal-host__header">
        <h3 class="modal-title modal-host__title" [id]="'modal-title-' + activeModal()!.id">{{ modalTitle() }}</h3>
        <div class="modal-host__meta text-body-secondary">
          @if (queueCount() > 0) {
            <span class="badge text-bg-secondary">{{ queueCount() }} queued</span>
          }
        </div>
      </header>

      <div class="modal-body modal-host__body">
        <p class="mb-0" [id]="'modal-body-' + activeModal()!.id" [innerHTML]="modalBodyHtml()"></p>
      </div>

      <footer class="modal-footer modal-host__footer">
        <button type="button" class="btn btn-primary modal-host__button" (click)="closeActiveModal()">
          Close
        </button>
      </footer>
      </section>
    </div>
  </div>
}
